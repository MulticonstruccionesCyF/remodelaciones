<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiconstrucciones C&F | Remodelaciones Profesionales</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --main-gold: #c5a059; --dark-gray: #333; }
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        
        /* Estilo del Header */
        .navbar { background: #000; border-bottom: 2px solid var(--main-gold); }
        
        /* Sección Hero con imagen de fondo */
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('1. DESPUES.jpg'); 
            background-size: cover; background-position: center;
            color: white; padding: 100px 0;
        }

        /* Galería de Antes y Después */
        .compare-img { width: 100%; height: 300px; object-fit: cover; border-radius: 8px; }
        .label-badge { background: var(--main-gold); color: white; padding: 5px 10px; border-radius: 5px; }

        /* Estilo del Botón Principal */
        .btn-custom { background: var(--main-gold); color: white; border: none; padding: 12px 30px; font-weight: bold; border-radius: 50px; }
        .btn-custom:hover { background: #a68545; color: white; }

        /* Formulario Profesional */
        .form-section { background: #f9f9f9; padding: 60px 0; }
        .card-form { border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 20px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top">
        <div class="container text-center">
            <img src="logo multiconstrucciones CF sin fondo.png" alt="Logo C&F" height="70">
        </div>
    </nav>

    <header class="hero text-center">
        <div class="container">
            <h1 class="display-3 fw-bold">Remodelaciones de Alto Nivel</h1>
            <p class="lead mb-4">Transformamos tu obra gris en el apartamento que siempre soñaste en Ibagué.</p>
            <a href="#cotizar" class="btn btn-custom btn-lg shadow">COTIZAR MI PROYECTO</a>
        </div>
    </header>

    <section class="container my-5">
        <h2 class="text-center fw-bold mb-5">Resultados Garantizados</h2>
        <div class="row g-4">
            <div class="col-md-6 text-center">
                <span class="label-badge mb-2 d-inline-block">ANTES</span>
                <img src="1. ANTES.jpg" class="compare-img" alt="Obra gris">
            </div>
            <div class="col-md-6 text-center">
                <span class="label-badge mb-2 d-inline-block">DESPUÉS</span>
                <img src="1. DESPUES.jpg" class="compare-img" alt="Remodelación terminada">
            </div>
        </div>
        
        <div class="row mt-5 justify-content-center">
            <div class="col-md-8">
                <div class="ratio ratio-16x9 shadow rounded overflow-hidden">
                    <video controls>
                        <source src="Publicidad remodelacion CIPRES (1).mp4" type="video/mp4">
                        Tu navegador no soporta videos.
                    </video>
                </div>
            </div>
        </div>
    </section>

    <section id="cotizar" class="form-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card card-form p-4 p-md-5">
                        <h2 class="text-center fw-bold mb-4">Calcula tu Remodelación aquí</h2>
                        
                        <form id="leadForm" action="https://formspree.io/f/mdayylqy" method="POST">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Nombre Completo</label>
                                    <input type="text" name="Nombre" id="name" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">WhatsApp (Celular)</label>
                                    <input type="tel" name="WhatsApp" id="phone" class="form-control" placeholder="318..." required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" name="Email" class="form-control" required>
                            </div>

                            <div class="row">
                                <div class="col-md-8 mb-3">
                                    <label class="form-label">Proyecto / Torre / Apto</label>
                                    <input type="text" name="Ubicacion" id="location" class="form-control" placeholder="Ej: Torreón Ciprés - T1 - 501" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">M² del Apto</label>
                                    <input type="number" name="Metros" id="sqm" class="form-control" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Servicios requeridos</label>
                                <select name="Servicio" id="service" class="form-select" required>
                                    <option value="Paquete Completo">Todo el paquete de remodelación (Obra Blanca)</option>
                                    <option value="Carpinteria">Carpintería en madera (Cocina/Closets)</option>
                                    <option value="Pintura-Estuco">Estuco y Pintura</option>
                                    <option value="Enchapes">Enchapes y Pisos</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Presupuesto Estimado</label>
                                <select name="Presupuesto" id="budget" class="form-select" required>
                                    <option value="10M-20M">$10.000.000 a $20.000.000</option>
                                    <option value="20M-30M">$20.000.000 a $30.000.000</option>
                                    <option value="+30M">Más de $30.000.000</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-custom w-100 p-3 fs-5">ENVIAR Y RECIBIR COTIZACIÓN POR WHATSAPP</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-4">
        <p>Multiconstrucciones C&F - Ibagué | 2026</p>
    </nav>

    <script>
        document.getElementById('leadForm').addEventListener('submit', function() {
            const name = document.getElementById('name').value;
            const location = document.getElementById('location').value;
            const service = document.getElementById('service').value;
            const budget = document.getElementById('budget').value;
            
            // Texto formateado para tu WhatsApp
            const text = `Hola Multiconstrucciones C&F! Soy ${name}. Me interesa el servicio de ${service} para mi apto en ${location}. Mi presupuesto es ${budget}. Me gustaría agendar una visita técnica.`;
            
            const whatsappUrl = `https://api.whatsapp.com/send?phone=573187633556&text=${encodeURIComponent(text)}`;
            
            // Abrimos el WhatsApp después de un segundo para permitir que el formulario se envíe por mail
            setTimeout(() => {
                window.open(whatsappUrl, '_blank');
            }, 800);
        });
    </script>
</body>
</html>
